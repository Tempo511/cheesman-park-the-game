<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheesman Park: The Game — Minimal Flyer</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  /* prints on US Letter portrait; open this file and hit Cmd+P */
  @page { size: letter portrait; margin: 0.5in; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #777; display: flex; justify-content: center; padding: 20px;
         font-family: ui-monospace, 'Courier New', monospace; }
  .sheet { width: 7.5in; min-height: 10in; background: #fff; color: #000;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           text-align: center; gap: 0.55in; padding: 0.6in; }
  @media print { body { background: none; padding: 0; } }
  h1 { font-size: 52px; line-height: 1.25; font-weight: 700; }
  .scene { image-rendering: pixelated; width: 6.4in; }
  .url { font-size: 26px; font-weight: 700; letter-spacing: 0.01em; }
  #qr img { width: 3.4in; height: 3.4in; image-rendering: pixelated; }
</style>
</head>
<body>
<div class="sheet">
  <h1>Enjoy Cheesman Park?<br>Play the game!</h1>
  <canvas id="scene" class="scene" width="260" height="44"></canvas>
  <div class="url">www.cheesmanparkthegame.com</div>
  <div id="qr"></div>
</div>
<script type="module">
import { buildSprites, drawZombie, drawPlayerChar, drawSprout } from './src/sprites.js';
import { makeRng } from './src/rng.js';

// same scene as the color flyer, rendered by the game's own sprite code —
// then thresholded to pure black & white to match the flyer
const SPR = buildSprites(makeRng(20260701));
const cv = document.getElementById('scene'), ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
ctx.fillStyle = '#888'; ctx.fillRect(0, 41, 260, 2);   // ground line
for (const [type, x] of [['tree', 16], ['cart', 60], ['pine', 104], ['tree2', 170], ['bush', 208], ['tree', 240]]) {
  const s = SPR[type]; if (!s) continue;
  ctx.drawImage(s.c, x - s.ax, 40 - s.ay);
}
drawZombie(ctx, 128, 38, 'right', 2, 1, false);
drawPlayerChar(ctx, 148, 38, 'right', 3, 'volleyball', 'm', false);
drawSprout(ctx, 186, 38, 'left', 1);
// grayscale + ordered dither: crisp 1-bit pixel art that photocopies cleanly
const img = ctx.getImageData(0, 0, 260, 44), d = img.data;
const B = [[0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]];
for (let y = 0; y < 44; y++) for (let x = 0; x < 260; x++) {
  const i = (y * 260 + x) * 4;
  if (d[i + 3] < 128) { d[i + 3] = 0; continue; }
  const lum = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
  const on = lum > (B[y % 4][x % 4] + 0.5) / 16 * 255;
  d[i] = d[i + 1] = d[i + 2] = on ? 255 : 0; d[i + 3] = 255;
}
ctx.putImageData(img, 0, 0);

// QR generated locally in the page — nothing leaves your machine
const qr = qrcode(0, 'M');
qr.addData('https://www.cheesmanparkthegame.com');
qr.make();
document.getElementById('qr').innerHTML = qr.createImgTag(10, 4);
</script>
</body>
</html>
